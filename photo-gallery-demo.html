<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Underwater Photography — Gallery</title>
    <style>
      /* ── Reset & Base ── */
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      :root {
        --bg: #0a0f1a;
        --surface: #111827;
        --border: #1e293b;
        --text: #e2e8f0;
        --text-muted: #94a3b8;
        --accent: #0ea5e9;
        --accent-glow: rgba(14, 165, 233, 0.25);
        --radius: 8px;
      }
      body {
        font-family:
          "Inter",
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          sans-serif;
        background: var(--bg);
        color: var(--text);
        line-height: 1.6;
        min-height: 100vh;
      }
      a {
        color: var(--accent);
        text-decoration: none;
      }

      /* ── Header ── */
      header {
        text-align: center;
        padding: 3rem 1.5rem 1.5rem;
        background: linear-gradient(180deg, #0c1425 0%, var(--bg) 100%);
      }
      header h1 {
        font-size: 2rem;
        font-weight: 300;
        letter-spacing: 0.04em;
      }
      header h1 span {
        color: var(--accent);
        font-weight: 600;
      }
      header p {
        color: var(--text-muted);
        margin-top: 0.4rem;
        font-size: 0.95rem;
      }

      /* ── Search Bar ── */
      .search-wrap {
        max-width: 640px;
        margin: 1.5rem auto 0;
        position: relative;
      }
      .search-wrap svg {
        position: absolute;
        left: 14px;
        top: 50%;
        transform: translateY(-50%);
        width: 18px;
        height: 18px;
        stroke: var(--text-muted);
      }
      #search {
        width: 100%;
        padding: 12px 16px 12px 42px;
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        color: var(--text);
        font-size: 1rem;
        outline: none;
        transition: border-color 0.2s;
      }
      #search:focus {
        border-color: var(--accent);
        box-shadow: 0 0 0 3px var(--accent-glow);
      }
      #search::placeholder {
        color: var(--text-muted);
      }
      .search-meta {
        text-align: center;
        margin-top: 0.6rem;
        font-size: 0.85rem;
        color: var(--text-muted);
      }

      /* ── Tag Filters ── */
      .filters {
        display: flex;
        flex-wrap: wrap;
        gap: 0.5rem;
        justify-content: center;
        max-width: 800px;
        margin: 1.2rem auto 0;
        padding: 0 1rem;
      }
      .tag-btn {
        padding: 5px 14px;
        border-radius: 999px;
        border: 1px solid var(--border);
        background: transparent;
        color: var(--text-muted);
        font-size: 0.82rem;
        cursor: pointer;
        transition: all 0.2s;
      }
      .tag-btn:hover,
      .tag-btn.active {
        background: var(--accent);
        color: #fff;
        border-color: var(--accent);
      }

      /* ── Gallery Grid ── */
      .gallery {
        column-count: 3;
        column-gap: 12px;
        max-width: 1200px;
        margin: 2rem auto;
        padding: 0 1rem;
      }
      @media (max-width: 900px) {
        .gallery {
          column-count: 2;
        }
      }
      @media (max-width: 560px) {
        .gallery {
          column-count: 1;
        }
      }

      .card {
        break-inside: avoid;
        margin-bottom: 12px;
        border-radius: var(--radius);
        overflow: hidden;
        background: var(--surface);
        border: 1px solid var(--border);
        transition:
          transform 0.25s,
          box-shadow 0.25s;
        cursor: pointer;
      }
      .card:hover {
        transform: translateY(-3px);
        box-shadow: 0 8px 24px rgba(0, 0, 0, 0.4);
      }
      .card img {
        width: 100%;
        display: block;
        /* placeholder colored rectangles for demo */
        object-fit: cover;
      }
      .card-body {
        padding: 10px 12px;
      }
      .card-body h3 {
        font-size: 0.9rem;
        font-weight: 500;
        margin-bottom: 4px;
      }
      .card-body .caption {
        font-size: 0.8rem;
        color: var(--text-muted);
        margin-bottom: 6px;
      }
      .card-body .tags {
        display: flex;
        flex-wrap: wrap;
        gap: 4px;
      }
      .card-body .tags span {
        font-size: 0.72rem;
        padding: 2px 8px;
        border-radius: 999px;
        background: rgba(14, 165, 233, 0.12);
        color: var(--accent);
      }
      .card.hidden {
        display: none;
      }

      /* ── Lightbox ── */
      .lightbox {
        display: none;
        position: fixed;
        inset: 0;
        z-index: 100;
        background: rgba(0, 0, 0, 0.92);
        align-items: center;
        justify-content: center;
        flex-direction: column;
        padding: 2rem;
      }
      .lightbox.open {
        display: flex;
      }
      .lightbox img {
        max-width: 90vw;
        max-height: 75vh;
        border-radius: var(--radius);
      }
      .lightbox .meta {
        text-align: center;
        margin-top: 1rem;
        max-width: 600px;
      }
      .lightbox .meta h2 {
        font-size: 1.2rem;
        margin-bottom: 0.3rem;
      }
      .lightbox .meta p {
        font-size: 0.9rem;
        color: var(--text-muted);
      }
      .lightbox .close-btn {
        position: absolute;
        top: 1.2rem;
        right: 1.5rem;
        background: none;
        border: none;
        color: #fff;
        font-size: 2rem;
        cursor: pointer;
        opacity: 0.7;
        transition: opacity 0.2s;
      }
      .lightbox .close-btn:hover {
        opacity: 1;
      }

      /* ── Footer ── */
      footer {
        text-align: center;
        padding: 2rem 1rem;
        color: var(--text-muted);
        font-size: 0.82rem;
        border-top: 1px solid var(--border);
      }

      /* ── Empty state ── */
      .no-results {
        text-align: center;
        padding: 4rem 1rem;
        color: var(--text-muted);
        display: none;
      }
      .no-results.visible {
        display: block;
      }
    </style>
  </head>
  <body>
    <header>
      <h1><span>Submarine</span> Division</h1>
      <p>Underwater &amp; Nature Photography — Image Library</p>

      <div class="search-wrap">
        <svg fill="none" viewBox="0 0 24 24" stroke-width="2">
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            d="M21 21l-4.35-4.35M11 19a8 8 0 100-16 8 8 0 000 16z"
          />
        </svg>
        <input
          id="search"
          type="text"
          placeholder="Search by keyword, tag, or description…"
          autocomplete="off"
        />
      </div>
      <p class="search-meta"><span id="count"></span> images</p>
      <div class="filters" id="filters"></div>
    </header>

    <main class="gallery" id="gallery"></main>
    <div class="no-results" id="no-results">No photos match your search.</div>

    <!-- Lightbox -->
    <div class="lightbox" id="lightbox">
      <button class="close-btn" onclick="closeLightbox()">&times;</button>
      <img id="lb-img" src="" alt="" />
      <div class="meta">
        <h2 id="lb-title"></h2>
        <p id="lb-caption"></p>
      </div>
    </div>

    <footer>
      &copy; 2026 Submarine Division Photography. All rights reserved.
    </footer>

    <script>
      // ═══════════════════════════════════════════════════════════
      //  PHOTO DATA — In production this comes from your CMS API
      // ═══════════════════════════════════════════════════════════
      // Each photo has:
      //   title        — your chosen title
      //   tags         — manually assigned keywords (array)
      //   aiCaption    — auto-generated description from an AI model
      //   src          — image URL (using placeholders here)
      //   aspect       — height ratio for placeholder images

      const photos = [
        {
          id: 1,
          title: "Blue Hole Descent",
          tags: ["reef", "cave", "blue hole", "wide-angle"],
          aiCaption:
            "A diver descends into a deep blue oceanic sinkhole surrounded by coral walls, sunlight filtering from above.",
          src: "",
          color: "#083358",
          aspect: 1.4,
        },
        {
          id: 2,
          title: "Hammerhead Squadron",
          tags: ["shark", "hammerhead", "pelagic", "school"],
          aiCaption:
            "A school of scalloped hammerhead sharks silhouetted against the bright ocean surface in open water.",
          src: "",
          color: "#0c4a6e",
          aspect: 0.7,
        },
        {
          id: 3,
          title: "Nudibranch Portrait",
          tags: ["macro", "nudibranch", "invertebrate", "colorful"],
          aiCaption:
            "Close-up of a vibrant chromodoris nudibranch with purple and orange gills on a coral-encrusted rock.",
          src: "",
          color: "#4c1d95",
          aspect: 1.0,
        },
        {
          id: 4,
          title: "Kelp Forest Cathedral",
          tags: ["kelp", "wide-angle", "sunlight", "california"],
          aiCaption:
            "Golden sunlight streams through towering giant kelp fronds creating a cathedral-like underwater scene.",
          src: "",
          color: "#065f46",
          aspect: 1.3,
        },
        {
          id: 5,
          title: "Manta Ray Flyby",
          tags: ["manta", "pelagic", "wide-angle", "cleaning station"],
          aiCaption:
            "A large oceanic manta ray glides overhead at a cleaning station, belly visible against blue water.",
          src: "",
          color: "#1e3a5f",
          aspect: 0.75,
        },
        {
          id: 6,
          title: "Coral Spawning Event",
          tags: ["coral", "spawning", "night dive", "macro"],
          aiCaption:
            "Tiny egg bundles rise from a staghorn coral colony during annual mass spawning at night.",
          src: "",
          color: "#7c2d12",
          aspect: 1.1,
        },
        {
          id: 7,
          title: "Seahorse on Gorgonian",
          tags: ["seahorse", "macro", "gorgonian", "camouflage"],
          aiCaption:
            "A pygmy seahorse perfectly camouflaged on a pink gorgonian sea fan, nearly invisible to the eye.",
          src: "",
          color: "#831843",
          aspect: 1.2,
        },
        {
          id: 8,
          title: "Whale Shark Encounter",
          tags: ["whale shark", "pelagic", "wide-angle", "snorkel"],
          aiCaption:
            "A massive whale shark cruises near the surface, its distinctive spotted pattern clearly visible in turquoise water.",
          src: "",
          color: "#0e4a70",
          aspect: 0.65,
        },
        {
          id: 9,
          title: "Fluorescent Anemone",
          tags: ["anemone", "fluorescence", "UV", "night dive"],
          aiCaption:
            "A sea anemone glows vivid green and orange under ultraviolet light during a fluorescence night dive.",
          src: "",
          color: "#14532d",
          aspect: 1.0,
        },
        {
          id: 10,
          title: "Octopus Intelligence",
          tags: ["octopus", "behavior", "macro", "cephalopod"],
          aiCaption:
            "A common reef octopus changes texture and color while investigating a camera lens with one extended arm.",
          src: "",
          color: "#44403c",
          aspect: 0.85,
        },
        {
          id: 11,
          title: "Jellyfish Lake",
          tags: ["jellyfish", "wide-angle", "palau", "golden"],
          aiCaption:
            "Thousands of golden jellyfish pulse through the water in Palau's famous Jellyfish Lake, lit by afternoon sun.",
          src: "",
          color: "#92400e",
          aspect: 1.15,
        },
        {
          id: 12,
          title: "Wreck of the Thistlegorm",
          tags: ["wreck", "history", "red sea", "wide-angle"],
          aiCaption:
            "A diver explores the cargo hold of the SS Thistlegorm, a World War II wreck covered in soft coral growth.",
          src: "",
          color: "#1c1917",
          aspect: 0.9,
        },
      ];

      // ═══════════════════════════════════════════════════════════
      //  SEARCH ENGINE — Fuse.js-style fuzzy matching (simplified)
      // ═══════════════════════════════════════════════════════════

      // Build searchable text for each photo (combines tags + AI caption + title)
      photos.forEach((p) => {
        p._searchText = [p.title, p.tags.join(" "), p.aiCaption]
          .join(" ")
          .toLowerCase();
      });

      function searchPhotos(query) {
        if (!query.trim()) return photos;
        const terms = query.toLowerCase().split(/\s+/);
        return photos.filter((p) =>
          terms.every((t) => p._searchText.includes(t)),
        );
      }

      // ═══════════════════════════════════════════════════════════
      //  RENDER
      // ═══════════════════════════════════════════════════════════

      const gallery = document.getElementById("gallery");
      const countEl = document.getElementById("count");
      const noRes = document.getElementById("no-results");
      const searchIn = document.getElementById("search");
      const filtersEl = document.getElementById("filters");

      // Collect unique tags
      const allTags = [...new Set(photos.flatMap((p) => p.tags))].sort();

      // Render tag filter buttons
      filtersEl.innerHTML = allTags
        .map((t) => `<button class="tag-btn" data-tag="${t}">${t}</button>`)
        .join("");

      // Placeholder SVG generator (since we don't have real images)
      function placeholderSVG(color, aspect, title) {
        const w = 600,
          h = Math.round(600 * aspect);
        return `data:image/svg+xml,${encodeURIComponent(`
    <svg xmlns="http://www.w3.org/2000/svg" width="${w}" height="${h}">
      <rect width="100%" height="100%" fill="${color}"/>
      <text x="50%" y="50%" dominant-baseline="middle" text-anchor="middle"
            fill="rgba(255,255,255,.25)" font-family="sans-serif" font-size="20">
        ${title}
      </text>
    </svg>
  `)}`;
      }

      function renderGallery(list) {
        gallery.innerHTML = list
          .map(
            (p) => `
    <div class="card" onclick="openLightbox(${p.id})">
      <img src="${p.src || placeholderSVG(p.color, p.aspect, p.title)}"
           alt="${p.title}" loading="lazy">
      <div class="card-body">
        <h3>${p.title}</h3>
        <p class="caption">${p.aiCaption}</p>
        <div class="tags">${p.tags.map((t) => `<span>${t}</span>`).join("")}</div>
      </div>
    </div>
  `,
          )
          .join("");
        countEl.textContent = list.length;
        noRes.classList.toggle("visible", list.length === 0);
      }

      // ── Search handler ──
      let activeTag = null;

      searchIn.addEventListener("input", () => {
        activeTag = null;
        updateFilters();
        render();
      });

      function render() {
        let results = searchPhotos(searchIn.value);
        if (activeTag)
          results = results.filter((p) => p.tags.includes(activeTag));
        renderGallery(results);
      }

      function updateFilters() {
        document
          .querySelectorAll(".tag-btn")
          .forEach((b) =>
            b.classList.toggle("active", b.dataset.tag === activeTag),
          );
      }

      filtersEl.addEventListener("click", (e) => {
        if (!e.target.classList.contains("tag-btn")) return;
        activeTag =
          activeTag === e.target.dataset.tag ? null : e.target.dataset.tag;
        updateFilters();
        render();
      });

      // ── Lightbox ──
      function openLightbox(id) {
        const p = photos.find((x) => x.id === id);
        document.getElementById("lb-img").src =
          p.src || placeholderSVG(p.color, p.aspect, p.title);
        document.getElementById("lb-title").textContent = p.title;
        document.getElementById("lb-caption").textContent = p.aiCaption;
        document.getElementById("lightbox").classList.add("open");
      }
      function closeLightbox() {
        document.getElementById("lightbox").classList.remove("open");
      }
      document.getElementById("lightbox").addEventListener("click", (e) => {
        if (e.target === e.currentTarget) closeLightbox();
      });
      document.addEventListener("keydown", (e) => {
        if (e.key === "Escape") closeLightbox();
      });

      // Initial render
      render();
    </script>
  </body>
</html>
